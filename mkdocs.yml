site_name: VocoDine Wiki
site_description: Organization wiki and system specification for VocoDine
site_url: https://example.com/
docs_dir: docs

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde

plugins:
  - search

nav:
  - Home: index.md
  - System Specification:
      - Architecture: system-specification/architecture.md
      - Sequence Diagram: system-specification/sequence.md
      - Tech Stack: system-specification/tech-stack.md
      - Audio Pipe: system-specification/audio-pipe/audio-pipe.md
      - Analytics: system-specification/analytics/analytics.md
  - Decisions:
      - Overview: decisions/index.md
      - ADR-001 LangGraph over Platforms: decisions/001-langgraph-over-platforms.md
      - ADR-002 Tiered Menu Context: decisions/002-tiered-menu-context.md
      - ADR-003 Adapter Layer: decisions/003-adapter-layer.md
      - ADR-004 Redis Menu Cache: decisions/004-redis-menu-cache.md
      - ADR-005 WhatsApp Feedback: decisions/005-whatsapp-sms-feedback.md
      - ADR-006 LiveKit over LangGraph: decisions/006-livekit-over-langgraph.md
  - Scope: scope.md
  - Evaluation: evaluation.md
